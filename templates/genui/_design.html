{# GenUI design system — single source of truth.

   One stylesheet, one component vocabulary. Included by every entry
   template (_base.html, saved_index.html, daily.html, error.html via
   _base). Per-template <style> blocks are intentionally gone; if you
   find yourself adding one, the rule belongs here as a component.

   Tokens are CSS custom properties. Themes are a one-attribute swap
   (`<html data-theme="light">`). No build step, no framework, system
   fonts only — first paint is instant. #}
<style>
@layer tokens, reset, primitives, components, utilities;

/* ── tokens ─────────────────────────────────────────────────────────── */
@layer tokens {
  :root {
    /* Surfaces — 4 elevations on near-black, calm not Dracula. */
    --bg-app:        #0b0c0e;
    --bg-raised:     #131418;
    --bg-overlay:    #1a1c21;
    --bg-sunken:     #08090b;

    /* Borders — 2 weights. */
    --border-subtle: #1f2127;
    --border-strong: #2a2d36;

    /* Text — 4 levels, all ≥ AA on bg-app. */
    --text-primary:   #ededf0;
    --text-secondary: #a4a7b0;
    --text-tertiary:  #6b6f7a;
    --text-inverse:   #0b0c0e;

    /* Accent — one muted hue with variants. */
    --accent:         #7c89ff;
    --accent-hover:   #9aa4ff;
    --accent-active:  #6573e6;
    --accent-subtle:  rgba(124, 137, 255, 0.10);
    --accent-border:  rgba(124, 137, 255, 0.30);
    --accent-fg:      #ffffff;

    /* Semantic — calm, not screaming. */
    --success:        #4ade80;
    --success-subtle: rgba(74, 222, 128, 0.10);
    --warning:        #f5b461;
    --warning-subtle: rgba(245, 180, 97, 0.10);
    --danger:         #ef6f6c;
    --danger-subtle:  rgba(239, 111, 108, 0.10);
    --info:           #7c89ff;
    --info-subtle:    rgba(124, 137, 255, 0.10);

    /* Chart sequence — 6 hues, distinguishable on dark, no neons. */
    --chart-1: #7c89ff;
    --chart-2: #4ade80;
    --chart-3: #f5b461;
    --chart-4: #ef6f6c;
    --chart-5: #9b8cff;
    --chart-6: #5fb3d4;
    --chart-grid:  rgba(255, 255, 255, 0.06);
    --chart-axis:  rgba(255, 255, 255, 0.14);
    --chart-label: var(--text-tertiary);

    /* Typography — system stack first; mono reserved for data. */
    --font-sans: ui-sans-serif, -apple-system, BlinkMacSystemFont,
                 "Inter", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    --font-mono: ui-monospace, "JetBrains Mono", "SF Mono", Menlo,
                 Consolas, "Liberation Mono", monospace;

    --fs-xs:   12px;   --lh-xs:   1.4;
    --fs-sm:   13px;   --lh-sm:   1.5;
    --fs-base: 14px;   --lh-base: 1.55;
    --fs-md:   16px;   --lh-md:   1.55;
    --fs-lg:   20px;   --lh-lg:   1.35;
    --fs-xl:   24px;   --lh-xl:   1.3;
    --fs-2xl:  30px;   --lh-2xl:  1.25;
    --fs-3xl:  40px;   --lh-3xl:  1.15;

    --fw-regular:  400;
    --fw-medium:   500;
    --fw-semibold: 600;

    /* Space — 4px base scale. */
    --space-1: 4px;
    --space-2: 8px;
    --space-3: 12px;
    --space-4: 16px;
    --space-5: 24px;
    --space-6: 32px;
    --space-7: 48px;
    --space-8: 64px;

    /* Radius. */
    --radius-sm:   4px;
    --radius-md:   6px;
    --radius-lg:   8px;
    --radius-xl:   12px;
    --radius-2xl: 16px;
    --radius-full: 999px;

    /* Shadows — rgba on near-black, not gray. */
    --shadow-sm: 0 1px 0 0 rgba(0,0,0,0.4),
                 0 1px 2px 0 rgba(0,0,0,0.3);
    --shadow-md: 0 4px 8px -2px rgba(0,0,0,0.5),
                 0 2px 4px -2px rgba(0,0,0,0.4);
    --shadow-lg: 0 12px 24px -6px rgba(0,0,0,0.6),
                 0 8px 16px -8px rgba(0,0,0,0.5);
    --shadow-focus: 0 0 0 3px rgba(124, 137, 255, 0.35);

    /* Motion. */
    --dur-fast: 120ms;
    --dur-base: 180ms;
    --dur-slow: 240ms;
    --ease:     cubic-bezier(0.2, 0, 0, 1);

    /* Layout. */
    --container-sm:  640px;
    --container-md:  900px;
    --container-lg: 1120px;
    --container-xl: 1280px;
    --topbar-h:      56px;
  }

  /* Reduced motion → snap all transitions. */
  @media (prefers-reduced-motion: reduce) {
    :root { --dur-fast: 0ms; --dur-base: 0ms; --dur-slow: 0ms; }
  }

  /* Future light theme — defined but never activated. Toggling
     <html data-theme="light"> swaps the entire portal. Every downstream
     rule references var(--…) so nothing else changes. */
  [data-theme="light"] {
    --bg-app:        #fafafa;
    --bg-raised:     #ffffff;
    --bg-overlay:    #ffffff;
    --bg-sunken:     #f4f4f5;
    --border-subtle: #e7e7ea;
    --border-strong: #d4d4d8;
    --text-primary:   #18181b;
    --text-secondary: #52525b;
    --text-tertiary:  #71717a;
    --text-inverse:   #ffffff;
    --chart-grid:  rgba(0, 0, 0, 0.06);
    --chart-axis:  rgba(0, 0, 0, 0.14);
    --shadow-sm: 0 1px 0 0 rgba(0,0,0,0.04),
                 0 1px 2px 0 rgba(0,0,0,0.06);
    --shadow-md: 0 4px 8px -2px rgba(0,0,0,0.08),
                 0 2px 4px -2px rgba(0,0,0,0.06);
    --shadow-lg: 0 12px 24px -6px rgba(0,0,0,0.12),
                 0 8px 16px -8px rgba(0,0,0,0.08);
  }
}

/* ── reset ──────────────────────────────────────────────────────────── */
@layer reset {
  *, *::before, *::after { box-sizing: border-box; }
  html, body, h1, h2, h3, h4, h5, h6, p, ul, ol, dl, dd, blockquote, figure {
    margin: 0; padding: 0;
  }
  html {
    -webkit-text-size-adjust: 100%;
    text-rendering: optimizeLegibility;
    color-scheme: dark;
  }
  body {
    background: var(--bg-app);
    color: var(--text-primary);
    font-family: var(--font-sans);
    font-size: var(--fs-base);
    line-height: var(--lh-base);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  img, svg, video, canvas { display: block; max-width: 100%; }
  button, input, select, textarea {
    font: inherit;
    color: inherit;
  }
  button { background: none; border: none; cursor: pointer; }
  ul, ol { list-style-position: outside; }
  :focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
    border-radius: inherit;
  }
  ::selection {
    background: var(--accent-subtle);
    color: var(--text-primary);
  }
  /* Webkit scrollbar — subtle, theme-aware. */
  * { scrollbar-width: thin; scrollbar-color: var(--border-strong) transparent; }
  *::-webkit-scrollbar { width: 10px; height: 10px; }
  *::-webkit-scrollbar-track { background: transparent; }
  *::-webkit-scrollbar-thumb {
    background: var(--border-strong);
    border-radius: var(--radius-full);
    border: 2px solid var(--bg-app);
  }
  *::-webkit-scrollbar-thumb:hover { background: var(--text-tertiary); }
}

/* ── primitives ─────────────────────────────────────────────────────── */
@layer primitives {
  a {
    color: var(--accent);
    text-decoration: none;
    transition: color var(--dur-fast) var(--ease);
  }
  a:hover { color: var(--accent-hover); }

  h1, h2, h3, h4, h5, h6 {
    color: var(--text-primary);
    font-weight: var(--fw-semibold);
    line-height: var(--lh-xl);
    letter-spacing: -0.01em;
  }
  h1 { font-size: var(--fs-2xl); letter-spacing: -0.02em; }
  h2 { font-size: var(--fs-xl); }
  h3 { font-size: var(--fs-lg); font-weight: var(--fw-medium); }
  h4 { font-size: var(--fs-md); font-weight: var(--fw-medium); }

  p { font-size: var(--fs-base); line-height: var(--lh-base); }

  code {
    font-family: var(--font-mono);
    font-size: 0.92em;
    background: var(--bg-sunken);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-sm);
    padding: 1px 5px;
    color: var(--text-primary);
  }
  pre {
    font-family: var(--font-mono);
    font-size: var(--fs-xs);
    background: var(--bg-sunken);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-md);
    padding: var(--space-3);
    overflow: auto;
    color: var(--text-secondary);
    max-height: 320px;
    line-height: 1.55;
  }
  pre code { background: none; border: none; padding: 0; font-size: inherit; }

  kbd {
    font-family: var(--font-mono);
    font-size: var(--fs-xs);
    background: var(--bg-overlay);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm);
    padding: 1px 6px;
    box-shadow: var(--shadow-sm);
  }

  hr {
    border: none;
    border-top: 1px solid var(--border-subtle);
    margin: var(--space-5) 0;
  }

  details > summary {
    cursor: pointer;
    user-select: none;
    list-style: none;
    color: var(--text-tertiary);
    transition: color var(--dur-fast) var(--ease);
  }
  details > summary::-webkit-details-marker { display: none; }
  details > summary:hover { color: var(--text-secondary); }
  details[open] > summary { color: var(--text-secondary); }

  /* Anchored headings + sticky topbar friendliness. */
  :target, [id] { scroll-margin-top: calc(var(--topbar-h) + var(--space-4)); }
}

/* ── components ─────────────────────────────────────────────────────── */
@layer components {

  /* ─── Layout shell ────────────────────────────────────────────────── */
  .container {
    width: 100%;
    margin-inline: auto;
    padding-inline: var(--space-5);
  }
  @media (min-width: 640px)  { .container { max-width: 640px;  } }
  @media (min-width: 900px)  { .container { max-width: 900px;  } }
  @media (min-width: 1120px) { .container { max-width: 1120px; } }
  @media (min-width: 1280px) { .container { max-width: 1200px; } }

  .container--sm { max-width: 640px !important; }
  .container--md { max-width: 900px !important; }

  .app-shell {
    padding-top: calc(var(--topbar-h) + var(--space-5));
    padding-bottom: var(--space-8);
    min-height: 100vh;
  }

  /* ─── Topbar (sticky, frosted) ────────────────────────────────────── */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 50;
    height: var(--topbar-h);
    display: flex;
    align-items: center;
    background: color-mix(in srgb, var(--bg-app) 78%, transparent);
    backdrop-filter: saturate(180%) blur(14px);
    -webkit-backdrop-filter: saturate(180%) blur(14px);
    border-bottom: 1px solid var(--border-subtle);
  }
  .topbar__inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--space-4);
    width: 100%;
    min-width: 0;
  }
  .topbar__lead {
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-width: 0;
    flex: 1 1 auto;
  }
  .topbar__eyebrow {
    display: flex;
    align-items: center;
    gap: var(--space-2);
    font-size: 11px;
    color: var(--text-tertiary);
    min-width: 0;
  }
  .topbar__title {
    font-size: var(--fs-base);
    font-weight: var(--fw-medium);
    color: var(--text-primary);
    line-height: 1.3;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .topbar__meta {
    display: flex;
    align-items: center;
    gap: var(--space-2);
    flex: 0 0 auto;
  }
  @media (max-width: 720px) {
    .topbar { height: auto; padding: var(--space-2) 0; }
    .topbar__inner { flex-direction: column; align-items: stretch; gap: var(--space-2); }
    .topbar__meta { overflow-x: auto; }
  }

  /* ─── Surfaces ────────────────────────────────────────────────────── */
  .surface {
    background: var(--bg-raised);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-lg);
  }
  .card {
    background: var(--bg-raised);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-lg);
    padding: var(--space-5);
    transition: border-color var(--dur-base) var(--ease),
                background var(--dur-base) var(--ease),
                transform var(--dur-base) var(--ease),
                box-shadow var(--dur-base) var(--ease);
  }
  .card--interactive { cursor: pointer; }
  .card--interactive:hover {
    border-color: var(--border-strong);
    transform: translateY(-1px);
    box-shadow: var(--shadow-md);
  }
  .card--inset { background: var(--bg-sunken); }
  .card--flush { padding: 0; overflow: hidden; }

  .card__title {
    font-size: var(--fs-md);
    font-weight: var(--fw-medium);
    color: var(--text-primary);
    margin-bottom: var(--space-1);
  }
  .card__subtitle {
    font-size: var(--fs-xs);
    color: var(--text-tertiary);
    margin-bottom: var(--space-3);
  }

  /* ─── Buttons ─────────────────────────────────────────────────────── */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: var(--space-2);
    height: 32px;
    padding: 0 var(--space-3);
    font-size: var(--fs-sm);
    font-weight: var(--fw-medium);
    color: var(--text-secondary);
    background: transparent;
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-md);
    cursor: pointer;
    white-space: nowrap;
    transition: color var(--dur-fast) var(--ease),
                background var(--dur-fast) var(--ease),
                border-color var(--dur-fast) var(--ease),
                box-shadow var(--dur-fast) var(--ease),
                transform var(--dur-fast) var(--ease);
  }
  .btn:hover {
    color: var(--text-primary);
    border-color: var(--border-strong);
    background: var(--bg-overlay);
    text-decoration: none;
  }
  .btn:active { transform: translateY(0.5px); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; pointer-events: none; }

  .btn--primary {
    background: var(--accent);
    color: var(--accent-fg);
    border-color: var(--accent);
  }
  .btn--primary:hover {
    background: var(--accent-hover);
    border-color: var(--accent-hover);
    color: var(--accent-fg);
  }
  .btn--primary:active { background: var(--accent-active); }

  .btn--danger {
    color: var(--danger);
    border-color: var(--border-subtle);
  }
  .btn--danger:hover {
    color: var(--danger);
    background: var(--danger-subtle);
    border-color: var(--danger);
  }

  .btn--sm  { height: 28px; padding: 0 var(--space-2); font-size: var(--fs-xs); }
  .btn--ghost { border-color: transparent; }
  .btn--ghost:hover { border-color: var(--border-subtle); }

  /* ─── Badges / tags / pills ───────────────────────────────────────── */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: var(--space-1);
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: var(--fw-medium);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: var(--radius-sm);
    background: var(--bg-overlay);
    color: var(--text-secondary);
    border: 1px solid var(--border-subtle);
    white-space: nowrap;
  }
  .badge--accent  { background: var(--accent-subtle);  color: var(--accent);  border-color: var(--accent-border); }
  .badge--success { background: var(--success-subtle); color: var(--success); border-color: rgba(74,222,128,0.30); }
  .badge--warning { background: var(--warning-subtle); color: var(--warning); border-color: rgba(245,180,97,0.30); }
  .badge--danger  { background: var(--danger-subtle);  color: var(--danger);  border-color: rgba(239,111,108,0.30); }
  .badge--info    { background: var(--info-subtle);    color: var(--info);    border-color: var(--accent-border); }
  .badge--neutral { background: var(--bg-overlay);     color: var(--text-secondary); }

  .tag {
    display: inline-flex;
    align-items: center;
    font-family: var(--font-sans);
    font-size: var(--fs-xs);
    font-weight: var(--fw-medium);
    padding: 2px 8px;
    border-radius: var(--radius-sm);
    background: var(--bg-overlay);
    color: var(--text-secondary);
    border: 1px solid var(--border-subtle);
    white-space: nowrap;
  }

  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: var(--space-1);
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: var(--fw-medium);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding: 2px 10px;
    border-radius: var(--radius-full);
    background: var(--bg-overlay);
    color: var(--text-secondary);
    border: 1px solid var(--border-subtle);
  }
  .status-pill--info,
  .status-pill.saved {
    background: var(--info-subtle);
    color: var(--accent);
    border-color: var(--accent-border);
  }
  .status-pill--warning,
  .status-pill.temporary {
    background: var(--warning-subtle);
    color: var(--warning);
    border-color: rgba(245,180,97,0.30);
  }
  .status-pill--success { background: var(--success-subtle); color: var(--success); border-color: rgba(74,222,128,0.30); }
  .status-pill--danger  { background: var(--danger-subtle);  color: var(--danger);  border-color: rgba(239,111,108,0.30); }

  .status-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: var(--space-2);
    vertical-align: middle;
    background: var(--text-tertiary);
    box-shadow: 0 0 0 3px color-mix(in srgb, currentColor 12%, transparent);
  }
  .status-dot.green,  .status-dot--success { background: var(--success); }
  .status-dot.blue,   .status-dot--info    { background: var(--accent);  }
  .status-dot.yellow, .status-dot--warning { background: var(--warning); }
  .status-dot.red,    .status-dot--danger  { background: var(--danger);  }
  .status-dot.gray,   .status-dot--neutral { background: var(--text-tertiary); }

  /* ─── KPI mini-card ───────────────────────────────────────────────── */
  .kpi {
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
    padding: var(--space-4) var(--space-5);
    background: var(--bg-raised);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-lg);
    transition: border-color var(--dur-base) var(--ease);
  }
  .kpi:hover { border-color: var(--border-strong); }
  .kpi__label {
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: var(--fw-medium);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-tertiary);
  }
  .kpi__value {
    font-family: var(--font-sans);
    font-size: var(--fs-2xl);
    font-weight: var(--fw-semibold);
    color: var(--text-primary);
    line-height: 1.1;
    letter-spacing: -0.02em;
    font-variant-numeric: tabular-nums;
  }
  .kpi__delta {
    display: inline-flex;
    align-items: center;
    gap: var(--space-1);
    font-family: var(--font-mono);
    font-size: var(--fs-xs);
    color: var(--text-tertiary);
  }
  .kpi__delta--up,   .kpi-delta.up   { color: var(--success); }
  .kpi__delta--down, .kpi-delta.down { color: var(--danger);  }
  .kpi__note {
    font-size: var(--fs-xs);
    color: var(--text-tertiary);
  }
  /* legacy class names emitted by some renderers — same look. */
  .kpi-label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em;
                text-transform: uppercase; color: var(--text-tertiary); }
  .kpi-delta { font-family: var(--font-mono); font-size: var(--fs-xs); margin-top: var(--space-1);
                color: var(--text-tertiary); }

  /* ─── Hero metric (metric_callout) ────────────────────────────────── */
  .metric-hero {
    text-align: center;
    padding: var(--space-7) var(--space-5);
  }
  .metric-hero__label {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: var(--fw-medium);
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-tertiary);
    margin-bottom: var(--space-4);
  }
  .metric-hero__value {
    font-family: var(--font-sans);
    font-size: 64px;
    font-weight: var(--fw-semibold);
    color: var(--text-primary);
    line-height: 1;
    letter-spacing: -0.04em;
    font-variant-numeric: tabular-nums;
  }
  .metric-hero__value--with-delta { font-size: 56px; }
  .metric-hero__delta {
    display: inline-flex;
    align-items: center;
    gap: var(--space-2);
    font-family: var(--font-mono);
    font-size: var(--fs-sm);
    margin-top: var(--space-3);
    padding: var(--space-1) var(--space-3);
    border-radius: var(--radius-full);
  }
  .metric-hero__delta--up      { color: var(--success); background: var(--success-subtle); }
  .metric-hero__delta--down    { color: var(--danger);  background: var(--danger-subtle);  }
  .metric-hero__delta--neutral { color: var(--text-secondary); background: var(--bg-overlay); }
  .metric-hero__delta-arrow { font-weight: var(--fw-semibold); }
  .metric-hero__context {
    color: var(--text-secondary);
    font-size: var(--fs-base);
    line-height: 1.6;
    margin: var(--space-5) auto 0;
    max-width: 56ch;
